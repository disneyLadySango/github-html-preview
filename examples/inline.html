<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inline Preview Example</title>
    <style>
      body {
        align-items: center;
        background: #f6f8fa;
        color: #24292f;
        display: grid;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }

      main {
        border: 1px solid #d0d7de;
        border-radius: 8px;
        background: #ffffff;
        max-width: 520px;
        padding: 24px;
        width: calc(100vw - 32px);
      }

      h1 {
        font-size: 22px;
        margin: 0 0 8px;
      }

      p {
        color: #57606a;
        line-height: 1.6;
      }

      button {
        background: #0969da;
        border: 0;
        border-radius: 6px;
        color: #ffffff;
        cursor: pointer;
        font-weight: 600;
        padding: 10px 14px;
      }

      .result {
        color: #1a7f37;
        font-weight: 600;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Inline HTML Preview</h1>
      <p>This page uses inline CSS and inline JavaScript only.</p>
      <button id="button" type="button">Run inline script</button>
      <div id="result" class="result"></div>
    </main>

    <script>
      document.getElementById("button").addEventListener("click", () => {
        document.getElementById("result").textContent = "Inline JavaScript ran successfully.";
      });
    </script>
  </body>
</html>
